apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-guestbook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/m-greeballah/argocd-example-apps-labs.git
    targetRevision: HEAD
    path: helm-guestbook
    helm:
      valuesObject:
        fullnameOverride: guestbook-ui
      valueFiles:
        - custom-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default